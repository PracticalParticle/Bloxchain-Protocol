# Dependabot opens PRs against dev so they follow the dev -> main flow
# required by .github/workflows/require-dev-to-main.yml
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      npm_and_yarn:
        patterns:
          - "*"
